<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="ibg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C1A38"/>
      <stop offset="100%" stop-color="#2F2A44"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#ibg)"/>
  <!-- Outer star spokes (12-point, simplified) -->
  <polygon points="16,2 17.7,5.6 21.7,4.3 20.9,8.4 24.9,9.7 22.9,13.3 26.5,15.2 23.6,18 25.7,21.9 21.6,22.6 21.5,26.8 17.5,25.8 16,29.5 14.5,25.8 10.5,26.8 10.4,22.6 6.3,21.9 8.4,18 5.5,15.2 9.1,13.3 7.1,9.7 11.1,8.4 10.3,4.3 14.3,5.6" fill="#E36414"/>
  <!-- Center disc -->
  <circle cx="16" cy="16" r="10" fill="#FEF5EC"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="9.5" fill="none" stroke="#E36414" stroke-width="0.5"/>
  <!-- Inner gold ring -->
  <circle cx="16" cy="16" r="7" fill="none" stroke="#D4A017" stroke-width="0.6"/>
  <!-- 8 petals -->
  <ellipse cx="16" cy="8" rx="1.2" ry="2.5" fill="#C67D53" transform="rotate(0 16 16)"/>
  <ellipse cx="16" cy="8" rx="1.2" ry="2.5" fill="#C67D53" transform="rotate(45 16 16)"/>
  <ellipse cx="16" cy="8" rx="1.2" ry="2.5" fill="#C67D53" transform="rotate(90 16 16)"/>
  <ellipse cx="16" cy="8" rx="1.2" ry="2.5" fill="#C67D53" transform="rotate(135 16 16)"/>
  <ellipse cx="16" cy="8" rx="1.2" ry="2.5" fill="#C67D53" transform="rotate(180 16 16)"/>
  <ellipse cx="16" cy="8" rx="1.2" ry="2.5" fill="#C67D53" transform="rotate(225 16 16)"/>
  <ellipse cx="16" cy="8" rx="1.2" ry="2.5" fill="#C67D53" transform="rotate(270 16 16)"/>
  <ellipse cx="16" cy="8" rx="1.2" ry="2.5" fill="#C67D53" transform="rotate(315 16 16)"/>
  <!-- Center hub -->
  <circle cx="16" cy="16" r="4" fill="#2F2A44"/>
  <circle cx="16" cy="16" r="3.2" fill="none" stroke="#D4A017" stroke-width="0.5"/>
  <!-- Jewel -->
  <circle cx="16" cy="16" r="2" fill="#E36414"/>
  <circle cx="16" cy="16" r="1" fill="#D4A017"/>
</svg>
